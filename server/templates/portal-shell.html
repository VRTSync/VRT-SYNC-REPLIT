<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VRTSync</title>
  <link rel="stylesheet" href="/portal-static/portal.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">

    <nav id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-logo">V</div>
        <div>
          <span class="brand-text">VRTSync</span>
          <span class="brand-sub" id="brand-sub">Portal</span>
        </div>
      </div>
      <ul class="nav-links" id="nav-links">
        <!-- Rendered by portal.js based on role -->
      </ul>
      <div class="sidebar-footer">
        <span>&copy; VRTSync</span>
      </div>
    </nav>

    <main id="main-content">
      <header id="topbar">
        <div class="topbar-left">
          <div id="community-area">
            <!-- Community label or picker rendered by portal.js -->
          </div>
        </div>
        <div class="topbar-right">
          <span id="user-display" class="user-badge"></span>
          <button id="logout-btn" class="btn btn-ghost btn-sm">Logout</button>
        </div>
      </header>
      <div id="page-content">
        <div class="loading-spinner">Loading...</div>
      </div>
    </main>

  </div>

  <div id="toast-container"></div>

  <script src="/portal-static/portal-api.js"></script>
  <script src="/portal-static/portal-router.js"></script>

  <!-- Pages — add new page scripts here as they are built -->
  <script src="/portal-static/pages/dashboard.js"></script>

  <script src="/portal-static/portal.js"></script>
</body>
</html>
