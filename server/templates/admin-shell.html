<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VRTSync Admin Hub</title>
  <link rel="stylesheet" href="/admin-static/admin.css">
  <link rel="stylesheet" href="/portal-static/portal-ext.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <script>
    window.PORTAL_CONFIG = {
      base:         '/web/admin',
      allowedRoles: ['admin'],
      label:        'Admin Hub'
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <nav id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-logo">V</div>
        <div>
          <span class="brand-text">VRTSync</span>
          <span class="brand-sub">Admin Hub</span>
        </div>
      </div>
      <ul class="nav-links">
        <li><a href="/web/admin/dashboard" data-route="dashboard" class="nav-link active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Dashboard
        </a></li>
        <li><a href="/web/admin/communities" data-route="communities" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Communities
        </a></li>
        <li><a href="/web/admin/users" data-route="users" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Users
        </a></li>
        <li><a href="/web/admin/templates" data-route="templates" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
          Templates
        </a></li>
        <li><a href="/web/admin/schedules" data-route="schedules" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Task Auto-Generate
        </a></li>
        <li><a href="/web/admin/service-schedules" data-route="service-schedules" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Mowing &amp; Service Days
        </a></li>
        <li><a href="/web/admin/imports/contract-tasks" data-route="imports/contract-tasks" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Import Tasks
        </a></li>
        <li><a href="/web/admin/exports" data-route="exports" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          Exports
        </a></li>
        <li><a href="/web/admin/invoices" data-route="invoices" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Invoices
        </a></li>
        <li><a href="/web/admin/contracts" data-route="contracts" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></svg>
          Contracts
        </a></li>
        <li><a href="/web/admin/contacts" data-route="contacts" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Contacts
        </a></li>
        <li><a href="/web/admin/reports" data-route="reports" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg>
          Reports
        </a></li>
        <li><a href="/web/admin/xeriscape-planner" data-route="xeriscape-planner" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22V12"/><path d="M5 12H2a10 10 0 0 0 20 0h-3"/><path d="M12 2v4"/><path d="M4.93 4.93l2.83 2.83"/><path d="M19.07 4.93l-2.83 2.83"/></svg>
          Xeriscape Planner
        </a></li>
      </ul>
    </nav>
    <main id="main-content">
      <header id="topbar">
        <div class="topbar-left" id="breadcrumb-area"></div>
        <div class="topbar-right">
          <button class="topbar-icon-btn btn-primary-icon" id="global-add-btn" title="New action" disabled>
            <span style="font-size:20px;font-weight:300;line-height:1;margin-top:-1px;">+</span>
          </button>
          <button class="topbar-icon-btn" id="notif-btn" title="Notifications" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 01-3.46 0"/>
            </svg>
            <span class="notif-dot" id="notif-dot"></span>
          </button>
          <div class="topbar-divider"></div>
          <div class="user-profile-chip">
            <div class="user-avatar" id="user-avatar">?</div>
            <div>
              <div class="user-name" id="user-display"></div>
              <div class="user-role-tag">Admin</div>
            </div>
          </div>
          <button id="logout-btn" class="btn btn-ghost btn-sm" style="display:none">Logout</button>
        </div>
      </header>
      <div id="page-content">
        <div class="loading-spinner">Loading...</div>
      </div>
    </main>
  </div>
  <div id="toast-container"></div>

  <script src="/admin-static/api.js"></script>
  <script src="/admin-static/router.js"></script>
  <script src="/admin-static/pages/dashboard.js"></script>
  <script src="/admin-static/pages/communities.js"></script>
  <script src="/admin-static/pages/users.js"></script>
  <script src="/admin-static/pages/community-detail.js"></script>
  <script src="/admin-static/pages/map-layers.js"></script>
  <script src="/admin-static/pages/assets.js"></script>
  <script src="/admin-static/pages/tasks.js"></script>
  <script src="/admin-static/pages/templates.js"></script>
  <script src="/admin-static/pages/schedules.js"></script>
  <script src="/admin-static/pages/service-schedules.js"></script>
  <script src="/admin-static/pages/exports.js"></script>
  <script src="/admin-static/pages/contract-import.js"></script>
  <script src="/admin-static/pages/invoices.js"></script>
  <script src="/admin-static/pages/contracts.js"></script>
  <script src="/admin-static/pages/contacts.js"></script>
  <script src="/admin-static/pages/reports.js"></script>
  <script src="/admin-static/pages/xeriscape-planner.js"></script>
  <script src="/admin-static/pages/account.js"></script>
  <script src="/portal-static/portal-api.js"></script>
  <script src="/admin-static/admin.js"></script>
  <script src="/portal-static/portal-topbar.js"></script>
  <script>PortalTopbar.init();</script>
</body>
</html>
