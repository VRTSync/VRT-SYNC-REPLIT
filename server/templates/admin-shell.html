<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VRTSync Admin Hub</title>
  <link rel="stylesheet" href="/admin-static/admin.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <nav id="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">&#9670;</span>
        <span class="brand-text">VRTSync</span>
      </div>
      <ul class="nav-links">
        <li><a href="/web/admin/dashboard" data-route="dashboard" class="nav-link active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
          Dashboard
        </a></li>
        <li><a href="/web/admin/communities" data-route="communities" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Communities
        </a></li>
        <li><a href="/web/admin/map-layers" data-route="map-layers" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
          Map Layers
        </a></li>
        <li><a href="/web/admin/assets" data-route="assets" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          Assets
        </a></li>
        <li><a href="/web/admin/tasks" data-route="tasks" class="nav-link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Tasks
        </a></li>
      </ul>
    </nav>
    <main id="main-content">
      <header id="topbar">
        <div class="topbar-left">
          <select id="community-selector" class="community-select">
            <option value="">Select community...</option>
          </select>
        </div>
        <div class="topbar-right">
          <span id="user-display" class="user-badge"></span>
          <button id="logout-btn" class="btn btn-ghost btn-sm">Logout</button>
        </div>
      </header>
      <div id="page-content">
        <div class="loading-spinner">Loading...</div>
      </div>
    </main>
  </div>
  <div id="toast-container"></div>

  <script src="/admin-static/api.js"></script>
  <script src="/admin-static/router.js"></script>
  <script src="/admin-static/pages/dashboard.js"></script>
  <script src="/admin-static/pages/communities.js"></script>
  <script src="/admin-static/pages/map-layers.js"></script>
  <script src="/admin-static/pages/assets.js"></script>
  <script src="/admin-static/pages/tasks.js"></script>
  <script src="/admin-static/admin.js"></script>
</body>
</html>
