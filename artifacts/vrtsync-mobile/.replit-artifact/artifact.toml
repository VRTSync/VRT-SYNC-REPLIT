kind = "mobile"
previewPath = "/"
title = "VRTSync Mobile"
version = "1.0.0"
id = "artifacts/vrtsync-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24922

[services.development]
run = "pnpm --filter @workspace/vrtsync-mobile run dev"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/vrtsync-mobile", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", "artifacts/vrtsync-mobile/server/serve.js"]

[services.production.run.env]
PORT = "24922"
BASE_PATH = "/"
NODE_ENV = "production"

[services.production.health.startup]
path = "/"

[services.env]
PORT = "24922"
BASE_PATH = "/"
